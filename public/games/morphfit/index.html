<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Morphfit</title>
<style>
  html, body { margin: 0; height: 100%; overflow: hidden; background: #F4F4F2;
    -webkit-tap-highlight-color: transparent; touch-action: none;
    font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; }
  canvas { display: block; }
  #dev { position: fixed; top: 4px; left: 4px; color: #0a0; font: 12px monospace; display: none; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="dev"></div>
<script type="module">
  import { initGame } from "./game.js";
  // Start the game first so nothing can block rendering.
  try { initGame(document.getElementById("c")); }
  catch (e) { console.error("initGame failed:", e); }
  // Audio is optional and must never block the game from showing.
  import("./audio.js")
    .then(m => { try { m.AUDIO.preload(); } catch (e) { console.warn("audio preload skipped:", e); } })
    .catch(e => console.warn("audio module skipped:", e));
</script>
</body>
</html>
