<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Jurassic Journey: Volcanic Escape</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #180f28; font-family: "Trebuchet MS", "Segoe UI", system-ui, sans-serif; color: #eef6f8; }
  #c { position: fixed; inset: 0; width: 100%; height: 100%; display: block; }
  .overlay { position: fixed; inset: 0; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; z-index: 20; background: rgba(16,9,30,.72); backdrop-filter: blur(3px); padding: 20px; padding-top: calc(20px + env(safe-area-inset-top)); padding-bottom: calc(20px + env(safe-area-inset-bottom)); }
  h1 { font-size: clamp(28px, 7vw, 64px); letter-spacing: .12em; background: linear-gradient(180deg,#bffcff,#2ee6ef 55%,#1a8f9c); -webkit-background-clip: text; background-clip: text; color: transparent; text-shadow: 0 0 24px rgba(46,230,239,.35); }
  h2 { font-size: clamp(16px, 3.4vw, 24px); letter-spacing: .5em; color: #ff9c5a; margin-top: 2px; }
  .tag { margin: 10px 0 26px; color: #cfd8ea; font-size: clamp(13px,2.6vw,17px); letter-spacing: .18em; }
  button { font-family: inherit; cursor: pointer; border: 0; }
  .big { display: block; width: min(320px, 78vw); margin: 8px auto; padding: 15px 10px; font-size: clamp(17px,3.6vw,22px); font-weight: 700; letter-spacing: .12em; color: #06222a; background: linear-gradient(180deg,#7ff3fa,#2ee6ef); border-radius: 14px; box-shadow: 0 4px 0 #128a95, 0 8px 22px rgba(0,0,0,.45); }
  .big:active { transform: translateY(3px); box-shadow: 0 1px 0 #128a95; }
  .ghost { display: inline-block; margin: 6px; padding: 10px 16px; font-size: 14px; color: #bfe9ee; background: rgba(46,230,239,.12); border: 1px solid rgba(46,230,239,.5); border-radius: 10px; letter-spacing: .08em; }
  .ver { position: absolute; bottom: calc(10px + env(safe-area-inset-bottom)); right: 14px; font-size: 11px; color: #7d88a5; }
  /* character cards */
  #sisterCards { display: flex; gap: 14px; flex-wrap: wrap; justify-content: center; margin-top: 16px; }
  .card { width: min(170px, 28vw); min-width: 128px; background: rgba(30,20,52,.9); border: 1px solid rgba(46,230,239,.35); border-radius: 16px; padding: 12px; cursor: pointer; transition: transform .12s; }
  .card:hover, .card:active { transform: translateY(-4px) scale(1.02); border-color: #2ee6ef; }
  .cardImg { width: 100%; aspect-ratio: 1; border-radius: 12px; border: 3px solid; overflow: hidden; background: #241a3e; display: flex; align-items: center; justify-content: center; }
  .cardImg img { width: 100%; height: 100%; object-fit: cover; }
  .cardFallback { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 54px; font-weight: 800; color: #fff; }
  .cardName { margin-top: 10px; font-size: 19px; font-weight: 800; letter-spacing: .12em; }
  .cardDesc { font-size: 12px; color: #aeb9d4; margin-top: 2px; }
  /* level buttons */
  #lvlButtons { display: grid; grid-template-columns: 1fr; gap: 10px; margin-top: 14px; width: min(380px, 86vw); max-height: 64vh; overflow-y: auto; padding: 4px; }
  @media (min-width: 700px) { #lvlButtons { grid-template-columns: 1fr 1fr; width: min(720px, 92vw); } }
  .lvlBtn { display: flex; align-items: center; gap: 14px; padding: 13px 16px; background: rgba(30,20,52,.92); border: 1px solid rgba(46,230,239,.4); border-radius: 13px; color: #eef6f8; font-size: 16px; font-weight: 700; letter-spacing: .06em; }
  .lvlBtn .lvlNum { width: 34px; height: 34px; border-radius: 50%; background: #2ee6ef; color: #06222a; display: flex; align-items: center; justify-content: center; font-weight: 800; flex-shrink: 0; }
  .lvlBtn .lvlName { flex: 1; text-align: left; }
  .lvlBtn .lvlBest { font-size: 12px; color: #f5c518; }
  .lvlBtn.locked { opacity: .45; cursor: default; }
  .lvlBtn:not(.locked):active { transform: scale(.985); border-color: #2ee6ef; }
  /* HUD */
  #hud { position: fixed; inset: 0; display: none; pointer-events: none; z-index: 10; }
  #hudTimer { position: absolute; top: calc(10px + env(safe-area-inset-top)); left: 50%; transform: translateX(-50%); font-size: clamp(26px,6vw,38px); font-weight: 800; letter-spacing: .06em; color: #dffbfd; text-shadow: 0 2px 8px rgba(0,0,0,.7); }
  #hudTimer.danger { color: #ff5f4a; animation: pulse .5s infinite alternate; }
  @keyframes pulse { from { transform: translateX(-50%) scale(1); } to { transform: translateX(-50%) scale(1.12); } }
  #hudLives { position: absolute; top: calc(12px + env(safe-area-inset-top)); left: 14px; display: flex; gap: 7px; }
  .lifeSphere { width: 22px; height: 22px; border-radius: 50%; position: relative;
    background: radial-gradient(circle at 34% 30%, rgba(255,255,255,.85), rgba(160,110,224,.55) 45%, rgba(90,50,150,.65) 100%);
    box-shadow: 0 0 8px rgba(160,110,224,.6), inset 0 0 6px rgba(255,255,255,.4); }
  .lifeSphere::before { content: ""; position: absolute; inset: 3px; border-radius: 50%;
    border: 1.5px solid rgba(191,239,245,.85); border-top-color: transparent; border-bottom-color: transparent; transform: rotate(-25deg); }
  .lifeSphere::after { content: ""; position: absolute; inset: 3px; border-radius: 50%;
    border: 1.5px solid rgba(191,239,245,.55); border-left-color: transparent; border-right-color: transparent; transform: rotate(-25deg); }
  #hudLevel { position: absolute; top: calc(42px + env(safe-area-inset-top)); left: 14px; font-size: 11px; color: #9fb2c8; letter-spacing: .12em; }
  #hudJewels { position: absolute; top: calc(38px + env(safe-area-inset-top)); right: 58px; font-size: clamp(13px,2.8vw,16px); font-weight: 800; color: #7ff3fa; text-shadow: 0 2px 6px rgba(0,0,0,.7); }
  #hudScore { position: absolute; top: calc(14px + env(safe-area-inset-top)); right: 58px; font-size: clamp(14px,3vw,18px); font-weight: 700; color: #f5e6b8; text-shadow: 0 2px 6px rgba(0,0,0,.7); }
  #btnPause { position: absolute; top: calc(8px + env(safe-area-inset-top)); right: 10px; width: 40px; height: 40px; border-radius: 10px; background: rgba(30,20,52,.8); color: #bfe9ee; font-size: 18px; pointer-events: auto; border: 1px solid rgba(46,230,239,.4); }
  #hudTurbo { position: absolute; top: calc(52px + env(safe-area-inset-top)); right: 14px; display: none; font-size: 13px; font-weight: 800; color: #ffb340; text-shadow: 0 0 10px rgba(255,150,40,.8); }
  #hudFreeze { position: absolute; top: calc(76px + env(safe-area-inset-top)); left: 50%; transform: translateX(-50%); display: none; font-size: 14px; font-weight: 700; color: #7ff3fa; text-shadow: 0 2px 6px rgba(0,0,0,.8); }
  #toast { position: absolute; top: 30%; left: 50%; transform: translateX(-50%); display: none; font-size: clamp(18px,4.6vw,26px); font-weight: 800; letter-spacing: .1em; color: #7ff3fa; text-shadow: 0 2px 12px rgba(0,0,0,.85); white-space: nowrap; }
  .toastAnim { animation: toastUp 1.9s ease-out forwards; }
  @keyframes toastUp { 0% { opacity: 0; margin-top: 16px; } 15% { opacity: 1; margin-top: 0; } 80% { opacity: 1; } 100% { opacity: 0; } }
  /* touch controls */
  #touchUI { position: fixed; inset: 0; display: none; z-index: 12; pointer-events: none; }
  #joyZone { position: absolute; left: 0; top: 25%; width: 55%; height: 75%; pointer-events: auto; }
  #joyBase { position: absolute; display: none; width: 112px; height: 112px; border-radius: 50%; border: 2px solid rgba(46,230,239,.55); background: rgba(46,230,239,.08); pointer-events: none; }
  #joyKnob { position: absolute; left: 50%; top: 50%; width: 52px; height: 52px; margin: -26px 0 0 -26px; border-radius: 50%; background: rgba(46,230,239,.55); }
  #btnHop, #btnTurbo { position: absolute; right: 18px; width: 76px; height: 76px; border-radius: 50%; font-weight: 800; font-size: 14px; letter-spacing: .06em; pointer-events: auto; color: #06222a; opacity: .92; }
  #btnHop { bottom: calc(24px + env(safe-area-inset-bottom)); background: radial-gradient(circle at 35% 30%, #aef7fb, #2ee6ef); box-shadow: 0 4px 0 #128a95; }
  #btnTurbo { bottom: calc(116px + env(safe-area-inset-bottom)); background: radial-gradient(circle at 35% 30%, #ffd9a0, #ff9c3a); box-shadow: 0 4px 0 #b25e14; opacity: .4; }
  #btnTurbo.ready { opacity: .95; animation: glowT 1s infinite alternate; }
  @keyframes glowT { from { box-shadow: 0 4px 0 #b25e14, 0 0 8px rgba(255,150,40,.4); } to { box-shadow: 0 4px 0 #b25e14, 0 0 26px rgba(255,170,60,.95); } }
  /* quiz */
  #quiz { position: fixed; inset: 0; display: none; align-items: center; justify-content: center; z-index: 30; background: rgba(10,6,22,.78); padding: 16px; }
  #quizPanel { width: min(560px, 94vw); background: linear-gradient(180deg,#241a44,#181030); border: 2px solid #2ee6ef; border-radius: 20px; padding: 22px 20px; box-shadow: 0 0 44px rgba(46,230,239,.3); text-align: center; }
  #quizHeader { font-size: 15px; font-weight: 800; letter-spacing: .3em; color: #ff9c5a; }
  #stationBar { height: 14px; background: rgba(0,0,0,.4); border-radius: 8px; margin: 12px auto 4px; overflow: hidden; border: 1px solid rgba(255,255,255,.2); }
  #stationFill { height: 100%; width: 0%; border-radius: 8px; transition: width .4s cubic-bezier(.3,1.4,.5,1); }
  #stationPips { text-align: center; font-size: 22px; letter-spacing: 10px; margin: 8px 0 0; color: #2ee6ef; text-shadow: 0 0 10px rgba(46,230,239,.6); }
  #hudPasses { color: #ffd23a; font-weight: 700; text-shadow: 0 0 8px rgba(0,0,0,.6); }
  #quizIntro { margin-top: 8px; font-size: 14px; color: #aeb9d4; }
  #quizQ { margin: 16px 4px; font-size: clamp(19px, 4.4vw, 26px); font-weight: 700; line-height: 1.35; color: #f2fbfd; }
  #quizOpts { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .qopt { padding: 16px 8px; font-size: clamp(17px,4vw,21px); font-weight: 800; color: #06222a; background: linear-gradient(180deg,#9df5fa,#2ee6ef); border-radius: 12px; box-shadow: 0 3px 0 #128a95; }
  .qopt:active { transform: translateY(2px); box-shadow: 0 1px 0 #128a95; }
  .qopt.good { background: linear-gradient(180deg,#9df7b8,#3ddb70); box-shadow: 0 3px 0 #1d8f44; }
  .qopt.bad { background: linear-gradient(180deg,#ffb9a3,#ff7a55); box-shadow: 0 3px 0 #b2401f; }
  #quizFeedback { margin-top: 14px; min-height: 22px; font-size: 17px; font-weight: 800; letter-spacing: .05em; }
  .shakeAnim { animation: shk .4s; }
  @keyframes shk { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-9px); } 50% { transform: translateX(8px); } 75% { transform: translateX(-5px); } }
  /* result panels */
  .panel { width: min(460px, 92vw); background: linear-gradient(180deg,#241a44,#181030); border: 2px solid #2ee6ef; border-radius: 20px; padding: 26px 22px; box-shadow: 0 0 44px rgba(46,230,239,.3); }
  .panel h3 { font-size: clamp(24px,5.6vw,32px); letter-spacing: .1em; color: #7ff3fa; }
  #winStars { font-size: 34px; color: #f5c518; margin: 8px 0 4px; letter-spacing: .2em; }
  .medalBadge { font-size: 22px; font-weight: 800; letter-spacing: .12em; margin-bottom: 2px; }
  .medalStars { font-size: 26px; color: #f5c518; letter-spacing: .2em; }
  .agaBlock { margin-top: 12px; padding: 10px 12px; border: 1px solid rgba(46,230,239,.35); border-radius: 12px; background: rgba(46,230,239,.06); }
  .agaHead { display: flex; justify-content: space-between; font-size: 14px; font-weight: 800; letter-spacing: .12em; color: #7ff3fa; margin-bottom: 6px; }
  .agaHead span { color: #5df08a; }
  .agaLine { display: flex; justify-content: space-between; font-size: 13px; color: #cfd8ea; padding: 3px 2px; }
  .agaLine.agaTotal { margin-top: 5px; padding-top: 7px; border-top: 1px dashed rgba(46,230,239,.25); font-weight: 800; color: #f5e6b8; }
  .lvlBtn .lvlMedal { font-size: 18px; margin-left: auto; padding-right: 4px; }
  #winRows { margin: 14px 0 18px; text-align: left; }
  #winRows div { display: flex; justify-content: space-between; padding: 7px 4px; font-size: 15px; color: #cfd8ea; border-bottom: 1px dashed rgba(46,230,239,.2); }
  #winRows .totalRow { font-size: 19px; font-weight: 800; color: #f5e6b8; border-bottom: 0; margin-top: 4px; }
  #howBody { max-width: 560px; text-align: left; margin: 14px 0 20px; max-height: 55vh; overflow-y: auto; padding: 0 6px; }
  #howBody p { margin: 9px 0; font-size: 15px; line-height: 1.45; color: #d5deee; }
    .menuRow { display:flex; gap:10px; justify-content:center; flex-wrap:wrap; }
  .big.alt { background:linear-gradient(180deg,#c9b6f2,#a06ee0); box-shadow:0 4px 0 #6b3fae,0 8px 22px rgba(0,0,0,.45); font-size:clamp(14px,3vw,18px); padding:10px 18px; }
  .storePanel { max-width:560px; width:92%; }
  .storeJewels { font-size:20px; color:#7ff3fa; font-weight:800; margin:6px 0 14px; }
  .storeGrid { display:grid; grid-template-columns:repeat(2,1fr); gap:12px; margin-bottom:18px; }
  .storeItem { background:rgba(30,20,50,.7); border:2px solid rgba(160,110,224,.5); border-radius:14px; padding:12px; text-align:center; cursor:pointer; transition:transform .1s,border-color .2s; }
  .storeItem:hover { transform:translateY(-2px); border-color:#7ff3fa; }
  .storeItem.owned { border-color:#5df08a; }
  .storeItem.equipped { border-color:#ffd23a; box-shadow:0 0 16px rgba(255,210,58,.4); }
  .storeItem.cant { opacity:.5; }
  .storeSwatch { width:46px; height:46px; border-radius:50%; margin:2px auto 8px; box-shadow:inset 0 0 8px rgba(255,255,255,.5); }
  .storeName { font-size:14px; font-weight:800; color:#eee; }
  .storePrice { font-size:13px; color:#7ff3fa; margin-top:4px; }
  .storeTag { font-size:11px; margin-top:3px; letter-spacing:.1em; }
  #cine { position:fixed; inset:0; z-index:60; background:#000; display:flex; align-items:center; justify-content:center; }
  #cineCanvas { width:100%; height:100%; display:block; }
  #cineSkip { position:absolute; bottom:32px; right:32px; color:rgba(255,255,255,.75); font-size:14px; letter-spacing:.2em; animation:pulse 1.4s infinite; }
  @keyframes pulse { 0%,100%{opacity:.4} 50%{opacity:.9} }
  #confetti { position:fixed; inset:0; z-index:55; pointer-events:none; overflow:hidden; }
  .confPiece { position:absolute; width:10px; height:14px; opacity:.95; animation:confFall linear forwards; }
  @keyframes confFall { to { transform:translateY(105vh) rotate(720deg); } }
  #mathReport { margin: 6px 0 4px; }
  .repTitle { font-size: 13px; letter-spacing: .2em; color: #7ff3fa; font-weight: 800; margin: 10px 0 6px; }
  .repRow { display: flex; align-items: center; gap: 8px; font-size: 12px; margin: 4px 0; color: #d5deee; }
  .repRow > span:first-child { flex: 0 0 42%; text-align: left; }
  .repBarWrap { flex: 1; height: 8px; background: rgba(0,0,0,.35); border-radius: 5px; overflow: hidden; }
  .repBar { display: block; height: 100%; border-radius: 5px; }
  .repTag { flex: 0 0 26%; text-align: right; font-weight: 700; }
  #splash { position: fixed; top: 34%; left: 0; right: 0; text-align: center; z-index: 15; pointer-events: none; opacity: 0; }
  #splash .splashNum { font-size: clamp(15px,3.4vw,20px); letter-spacing: .5em; color: #ff9c5a; font-weight: 800; }
  #splash .splashName { font-size: clamp(30px,7.5vw,54px); letter-spacing: .14em; font-weight: 800; background: linear-gradient(180deg,#bffcff,#2ee6ef 55%,#1a8f9c); -webkit-background-clip: text; background-clip: text; color: transparent; text-shadow: 0 0 26px rgba(46,230,239,.3); }
  .splashAnim { animation: splashIn 2.6s ease-out forwards; }
  @keyframes splashIn { 0% { opacity: 0; transform: scale(.92); } 12% { opacity: 1; transform: scale(1); } 78% { opacity: 1; } 100% { opacity: 0; transform: scale(1.03); } }
  #dev { position: fixed; bottom: 4px; left: 6px; display: none; z-index: 50; font: 11px monospace; color: #7ff3fa; text-shadow: 0 1px 3px #000; }
  #failTitle { color: #ff8f6a !important; }
  /* ---- v14 polish pass ---- */
  /* menu title breathing glow */
  #menuTitle { animation: titleGlow 3.6s ease-in-out infinite; }
  @keyframes titleGlow { 0%,100% { text-shadow: 0 0 24px rgba(46,230,239,.35); } 50% { text-shadow: 0 0 40px rgba(46,230,239,.62); } }
  /* persistent lifetime AGA points badge on the menu */
  .agaBadge { display: none; margin: 4px 0 12px; padding: 7px 18px; border: 1px solid rgba(245,197,24,.5); border-radius: 20px; background: rgba(245,197,24,.08); font-size: clamp(12px,2.6vw,15px); font-weight: 800; letter-spacing: .14em; color: #f5e6b8; box-shadow: 0 0 16px rgba(245,197,24,.12); }
  .agaBadge b { color: #f5c518; font-size: 1.1em; }
  /* correct-answer pop on quiz options (checkpoint + challenge gates) */
  .qopt.good { animation: qpop .42s cubic-bezier(.3,1.5,.5,1); }
  @keyframes qpop { 0% { transform: scale(1); } 40% { transform: scale(1.13); } 100% { transform: scale(1); } }
  /* on-screen shield-absorb pulse — makes the hybrid shield hit legible */
  #shieldFlash { position: fixed; inset: 0; z-index: 14; pointer-events: none; display: none; }
  #shieldFlash.on { display: block; animation: shieldPulse .5s ease-out forwards; }
  @keyframes shieldPulse { 0% { box-shadow: inset 0 0 100px 26px rgba(46,230,239,.85); opacity: 1; } 100% { box-shadow: inset 0 0 46px 8px rgba(46,230,239,0); opacity: 0; } }
  /* win-screen staged reveal */
  .revealPanel { animation: panelPop .5s cubic-bezier(.2,1.1,.3,1); }
  @keyframes panelPop { 0% { opacity: 0; transform: scale(.86) translateY(14px); } 60% { opacity: 1; transform: scale(1.03); } 100% { opacity: 1; transform: scale(1) translateY(0); } }
  @keyframes badgePop { 0% { opacity: 0; transform: scale(.3) rotate(-12deg); } 55% { opacity: 1; transform: scale(1.18) rotate(4deg); } 100% { transform: scale(1) rotate(0); } }
  .medalStars .starU { display: inline-block; }
  @keyframes starPop { 0% { opacity: 0; transform: scale(.2); } 60% { opacity: 1; transform: scale(1.4); } 100% { opacity: 1; transform: scale(1); } }
  @keyframes rowSlide { from { opacity: 0; transform: translateX(-14px); } to { opacity: 1; transform: translateX(0); } }
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="hud">
  <div id="hudTimer">3:00</div>
  <div id="hudLives"></div>
  <div id="hudLevel"></div>
  <div id="hudScore"></div>
  <div id="hudJewels"></div>
  <div id="hudPasses"></div>
  <button id="btnPause">&#10074;&#10074;</button>
  <div id="hudTurbo">&#9889; TURBO</div>
  <div id="hudFreeze"></div>
  <div id="toast"></div>
</div>

<div id="touchUI">
  <div id="joyZone"><div id="joyBase"><div id="joyKnob"></div></div></div>
  <button id="btnHop">HOP</button>
  <button id="btnTurbo">TURBO</button>
</div>

<div class="overlay" id="menu" style="display:flex">
  <h1 id="menuTitle">JURASSIC JOURNEY</h1>
  <h2 id="menuSub">VOLCANIC ESCAPE</h2>
  <div class="tag" id="menuTag"></div>
  <div class="agaBadge" id="menuAga"></div>
  <button class="big" id="btnPlay">PLAY</button>
  <div class="menuRow">
    <button class="big alt" id="btnPractice">PRACTICE</button>
    <button class="big alt" id="btnStore">STORE</button>
  </div>
  <div class="menuRow">
    <button class="big alt" id="btnDaily">DAILY CHALLENGE</button>
    <button class="big alt" id="btnHow2">HOW TO PLAY</button>
  </div>
  <div>
    <button class="ghost" id="btnGrade">MATH: GRADE 3</button>
    <button class="ghost" id="btnDifficulty">TRAIL: WILD RIDE</button>
    <button class="ghost" id="btnTilt">TILT STEERING: OFF</button>
    <button class="ghost" id="btnSound">SOUND: ON</button>
  </div>
  <button class="big" id="btnHow" style="display:none">HOW TO PLAY</button>
  <div class="ver" id="menuVersion"></div>
</div>

<div class="overlay" id="select">
  <h2 id="selTitle" style="color:#7ff3fa;letter-spacing:.3em"></h2>
  <div id="sisterCards"></div>
</div>

<div class="overlay" id="levels">
  <h2 id="lvlTitle" style="color:#7ff3fa;letter-spacing:.3em"></h2>
  <div id="lvlButtons"></div>
</div>

<div class="overlay" id="howto">
  <h2 id="howTitle" style="color:#7ff3fa;letter-spacing:.3em"></h2>
  <div id="howBody"></div>
  <button class="big" id="btnHowBack">BACK</button>
</div>

<div id="quiz">
  <div id="quizPanel">
    <div id="quizHeader">CHALLENGE GATE</div>
    <div id="stationPips"></div>
  <div id="stationBar" style="display:none"><div id="stationFill"></div></div>
    <div id="quizIntro"></div>
    <div id="quizQ"></div>
    <div id="quizOpts"></div>
    <div id="quizFeedback"></div>
  </div>
</div>

<div class="overlay" id="pause">
  <div class="panel">
    <h3 id="pauseTitle">PAUSED</h3>
    <div style="height:14px"></div>
    <button class="big" id="btnResume">RESUME</button>
    <button class="big" id="btnRestart" style="background:linear-gradient(180deg,#c9b6f2,#a06ee0);box-shadow:0 4px 0 #6b3fae">RESTART LEVEL</button>
    <button class="big" id="btnPauseMenu" style="background:linear-gradient(180deg,#ffd9a0,#ff9c3a);box-shadow:0 4px 0 #b25e14">MAIN MENU</button>
  </div>
</div>

<div class="overlay" id="fail">
  <div class="panel">
    <h3 id="failTitle">TIME'S UP!</h3>
    <div style="height:14px"></div>
    <button class="big" id="btnRetry">RETRY LEVEL</button>
    <button class="big" id="btnFailMenu" style="background:linear-gradient(180deg,#ffd9a0,#ff9c3a);box-shadow:0 4px 0 #b25e14">MAIN MENU</button>
  </div>
</div>

<div class="overlay" id="win">
  <div class="panel">
    <h3 id="winTitle">LEVEL COMPLETE!</h3>
    <div id="winStars"></div>
    <div id="winRows"></div>
    <div id="mathReport"></div>
    <button class="big" id="btnNext">NEXT LEVEL</button>
    <button class="big" id="btnReplay" style="background:linear-gradient(180deg,#c9b6f2,#a06ee0);box-shadow:0 4px 0 #6b3fae">REPLAY</button>
    <button class="big" id="btnWinMenu" style="background:linear-gradient(180deg,#ffd9a0,#ff9c3a);box-shadow:0 4px 0 #b25e14">MAIN MENU</button>
  </div>
</div>

<div class="overlay" id="final">
  <div class="panel">
    <h3 id="finalTitle"></h3>
    <div style="font-size:20px;color:#f5e6b8;font-weight:800;margin:16px 0" id="finalScore"></div>
    <button class="big" id="btnFinalMenu">PLAY AGAIN</button>
  </div>
</div>

<div class="overlay" id="story">
  <div class="panel" style="max-width:560px">
    <h3 id="storyTitle" style="color:#ff9c5a;letter-spacing:.24em;font-size:clamp(17px,4vw,24px)"></h3>
    <p id="storyBody" style="text-align:left;font-size:15px;line-height:1.55;color:#d5deee;margin:16px 2px 20px"></p>
    <button class="big" id="btnBegin">BEGIN MISSION</button>
  </div>
</div>
<div class="overlay" id="store" style="display:none">
  <div class="panel storePanel">
    <h3 style="color:#7ff3fa;letter-spacing:.2em">JEWEL STORE</h3>
    <div class="storeJewels" id="storeJewels">◆ 0</div>
    <div id="storeGrid" class="storeGrid"></div>
    <button class="big" id="btnStoreClose">BACK</button>
  </div>
</div>
<div id="cine" style="display:none"><canvas id="cineCanvas"></canvas><div id="cineSkip">TAP TO SKIP</div></div>
<div id="shieldFlash"></div>
<div id="confetti"></div>
<div id="splash"></div>
<div id="dev"></div>
<script type="module" src="./game.js"></script>
</body>
</html>
